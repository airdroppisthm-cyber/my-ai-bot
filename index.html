<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo RAG AI</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-box { height: 65vh; overflow-y: auto; scroll-behavior: smooth; }
        .bot-msg { background: #1e293b; color: white; border-radius: 15px 15px 15px 0; border: 1px solid #334155; }
        .user-msg { background: #3b82f6; color: white; border-radius: 15px 15px 0 15px; }
        body { background: radial-gradient(circle at top, #1e293b, #0f172a); }
    </style>
</head>
<body class="text-slate-100 flex flex-col items-center p-4 font-sans min-h-screen">

    <header class="w-full max-w-md flex justify-between items-center py-4">
        <h1 class="text-2xl font-black text-blue-400 tracking-tight">Echo RAG AI</h1>
        <div id="status" class="text-xs text-slate-400">● Online</div>
    </header>

    <main class="w-full max-w-md bg-slate-900/50 backdrop-blur-md rounded-3xl p-4 shadow-2xl border border-white/10">
        <div id="chatWindow" class="chat-box mb-4 flex flex-col gap-4 p-2">
            <div class="bot-msg p-3 text-sm shadow-lg">Welcome! I am your private AI. I can search the web automatically when needed.</div>
        </div>

        <div class="flex gap-2 bg-slate-800 p-2 rounded-2xl border border-white/5">
            <input id="userInput" type="text" class="flex-1 bg-transparent border-none p-2 text-sm focus:outline-none" placeholder="Ask me anything...">
            <button id="voiceBtn" class="bg-slate-700 hover:bg-slate-600 p-3 rounded-xl transition-all">🎙️</button>
            <button id="sendBtn" class="bg-blue-600 hover:bg-blue-500 p-3 rounded-xl font-bold transition-all">Send</button>
        </div>
    </main>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const voiceBtn = document.getElementById('voiceBtn');

        // VOICE CONFIG
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        
        voiceBtn.onclick = () => {
            if(!recognition) return alert("Voice not supported");
            recognition.start();
            voiceBtn.classList.add('animate-pulse', 'bg-red-500');
        };

        if(recognition) {
            recognition.onresult = (e) => {
                userInput.value = e.results[0][0].transcript;
                voiceBtn.classList.remove('animate-pulse', 'bg-red-500');
                handleSend();
            };
        }

        async function handleSend() {
            const query = userInput.value.trim();
            if(!query) return;
            
            appendMessage(query, 'user-msg');
            userInput.value = '';
            const loadingMsg = appendMessage("Connecting to intelligence network...", 'bot-msg');

            try {
                // IMPROVED SEARCH: Using a dual-path approach
                // We use an open duckduckgo proxy for browser compatibility
                const searchUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://links.duckduckgo.com/lite/?q=${query}`)}`;
                const response = await fetch(searchUrl);
                const searchData = await response.json();
                
                // FALLBACK AI: Using a reliable free model
                const aiResponse = await fetch("https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: `Search Context: ${searchData.contents.substring(0, 1000)} \n\nUser Question: ${query}` })
                });

                const finalData = await aiResponse.json();
                loadingMsg.remove();
                
                let reply = (finalData[0] && finalData[0].generated_text) || finalData.generated_text || "I've processed that. How else can I help?";
                
                appendMessage(reply, 'bot-msg');
                const utter = new SpeechSynthesisUtterance(reply);
                window.speechSynthesis.speak(utter);

            } catch (err) {
                loadingMsg.innerText = "I had a connection hiccup. Let's try that again.";
                console.error(err);
            }
        }

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.className = `p-4 text-sm ${className} max-w-[85%] self-${className === 'user-msg' ? 'end' : 'start'} shadow-sm`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        sendBtn.onclick = handleSend;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
