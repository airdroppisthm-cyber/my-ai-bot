
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo RAG AI</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-box { height: 60vh; overflow-y: auto; }
        .bot-msg { background: #1e293b; color: white; border-radius: 15px 15px 15px 0; }
        .user-msg { background: #3b82f6; color: white; border-radius: 15px 15px 0 15px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 flex flex-col items-center p-4 font-sans">

    <header class="w-full max-w-md flex justify-between items-center py-4">
        <h1 class="text-xl font-bold text-blue-400">Echo RAG AI</h1>
        <button id="installBtn" class="hidden bg-blue-600 px-3 py-1 rounded text-sm">Install App</button>
    </header>

    <main class="w-full max-w-md bg-slate-800 rounded-2xl p-4 shadow-2xl">
        <div id="chatWindow" class="chat-box mb-4 flex flex-col gap-3">
            <div class="bot-msg p-3 text-sm">Hello! I can search the web in real-time. Ask me anything!</div>
        </div>

        <div class="flex gap-2">
            <input id="userInput" type="text" class="flex-1 bg-slate-700 border-none rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500" placeholder="Type or use voice...">
            <button id="voiceBtn" class="bg-slate-700 p-3 rounded-lg">🎙️</button>
            <button id="sendBtn" class="bg-blue-600 p-3 rounded-lg font-bold">Send</button>
        </div>
    </main>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const voiceBtn = document.getElementById('voiceBtn');

        // 1. VOICE SYSTEM
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition ? new SpeechRecognition() : null;
        const synth = window.speechSynthesis;

        voiceBtn.onclick = () => {
            if(!recognition) return alert("Voice not supported on this browser");
            recognition.start();
            voiceBtn.innerText = "Listening...";
        };

        if(recognition) {
            recognition.onresult = (e) => {
                userInput.value = e.results[0][0].transcript;
                voiceBtn.innerText = "🎙️";
                handleSend();
            };
        }

        // 2. THE SEARCH & AI LOGIC (RAG)
        async function handleSend() {
            const text = userInput.value.trim();
            if(!text) return;
            
            appendMessage(text, 'user-msg');
            userInput.value = '';

            // Status indicator
            const loadingMsg = appendMessage("Searching web & thinking...", 'bot-msg');

            try {
                // FETCH REAL-TIME DATA (No key needed)
                const searchRes = await fetch(`https://s.jina.ai/${encodeURIComponent(text)}`);
                const context = await searchRes.text();

                // CALL AI (Using a free public inference endpoint)
                const aiRes = await fetch("https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill", {
                    method: "POST",
                    body: JSON.stringify({ inputs: `Context: ${context.substring(0, 500)} Question: ${text}` })
                });
                const data = await aiRes.json();
                
                loadingMsg.remove();
                const reply = data.generated_text || "I found information but had trouble processing it. Try again!";
                appendMessage(reply, 'bot-msg');
                
                // Speak the result
                const utter = new SpeechSynthesisUtterance(reply);
                synth.speak(utter);

            } catch (err) {
                loadingMsg.innerText = "Error: Could not connect to the live web.";
            }
        }

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.className = `p-3 text-sm ${className} max-w-[80%] self-${className === 'user-msg' ? 'end' : 'start'}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        sendBtn.onclick = handleSend;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
